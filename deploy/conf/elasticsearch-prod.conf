# Nexus Elasticsearch production profile.
# Copy or symlink this file to $ES_PATH_CONF/elasticsearch.yml.
# RAGFlow may manage Elasticsearch/vector engine, but the runtime still needs
# private networking, security, disk watermarks and cluster bootstrap controls.

cluster.name: nexus-prod-search
node.name: ${ES_NODE_NAME}
node.roles: [ master, data_hot, ingest ]

path.data: /var/lib/elasticsearch
path.logs: /var/log/elasticsearch

network.host: 0.0.0.0
http.port: 9200
transport.port: 9300
bootstrap.memory_lock: true

discovery.seed_hosts: [ "es-1.nexus.internal", "es-2.nexus.internal", "es-3.nexus.internal" ]
cluster.initial_master_nodes: [ "es-1", "es-2", "es-3" ]

xpack.security.enabled: true
xpack.security.http.ssl.enabled: true
xpack.security.http.ssl.key: /etc/elasticsearch/tls/http.key
xpack.security.http.ssl.certificate: /etc/elasticsearch/tls/http.crt
xpack.security.http.ssl.certificate_authorities: [ "/etc/elasticsearch/tls/ca.crt" ]
xpack.security.transport.ssl.enabled: true
xpack.security.transport.ssl.verification_mode: certificate
xpack.security.transport.ssl.key: /etc/elasticsearch/tls/transport.key
xpack.security.transport.ssl.certificate: /etc/elasticsearch/tls/transport.crt
xpack.security.transport.ssl.certificate_authorities: [ "/etc/elasticsearch/tls/ca.crt" ]

action.destructive_requires_name: true
indices.query.bool.max_clause_count: 4096
indices.memory.index_buffer_size: 10%

cluster.routing.allocation.disk.watermark.low: 75%
cluster.routing.allocation.disk.watermark.high: 85%
cluster.routing.allocation.disk.watermark.flood_stage: 95%
cluster.routing.allocation.same_shard.host: true

thread_pool.write.queue_size: 1000
search.max_buckets: 65536

http.cors.enabled: false
