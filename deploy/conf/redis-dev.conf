# Nexus Redis 7.x development profile.
# Dev profile favors local convenience; do not use it in shared environments.

bind 0.0.0.0
port 6379
protected-mode no
tcp-backlog 511
timeout 0
tcp-keepalive 300

daemonize no
supervised no
databases 16

save 900 1
save 300 10
save 60 10000
appendonly no

maxmemory 512mb
maxmemory-policy allkeys-lru

loglevel notice
logfile ""
slowlog-log-slower-than 10000
slowlog-max-len 128

latency-monitor-threshold 100
notify-keyspace-events ""
