# Nexus MinIO production profile.
# This is an environment file sourced by supervisor or shell wrappers.
# Use *_FILE variants so secrets are not committed in this repository.

MINIO_VOLUMES="http://minio{1...3}.nexus.internal:9000/data{1...2}"
MINIO_OPTS="--address :9000 --console-address :9001 --certs-dir /etc/minio/certs"

MINIO_ROOT_USER_FILE="/run/secrets/minio_root_user"
MINIO_ROOT_PASSWORD_FILE="/run/secrets/minio_root_password"
MINIO_REGION_NAME="us-east-1"
MINIO_SERVER_URL="https://s3.nexus.example.com"
MINIO_BROWSER="on"

MINIO_STORAGE_CLASS_STANDARD="EC:2"
MINIO_API_REQUESTS_MAX="1600"
MINIO_API_REQUESTS_DEADLINE="10s"
MINIO_API_CORS_ALLOW_ORIGIN="https://nexus.example.com"
MINIO_PROMETHEUS_AUTH_TYPE="jwt"

# Prefer SSE-KMS in production when an enterprise KMS is available.
# MINIO_KMS_KES_ENDPOINT="https://kes.nexus.internal:7373"
# MINIO_KMS_KES_CERT_FILE="/etc/minio/kes/client.crt"
# MINIO_KMS_KES_KEY_FILE="/etc/minio/kes/client.key"
# MINIO_KMS_KES_KEY_NAME="nexus-minio-master-key"
