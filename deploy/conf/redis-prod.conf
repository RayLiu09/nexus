# Nexus Redis 7.x production profile.
# Secrets must be managed through /etc/redis/users.acl or external secret tools.
# Keep Redis on a private network; expose only to NEXUS services.

bind 0.0.0.0
port 6379
protected-mode yes
tcp-backlog 2048
timeout 0
tcp-keepalive 300

daemonize no
supervised no
databases 16

aclfile /etc/redis/users.acl

save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /var/lib/redis

appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 256mb
aof-use-rdb-preamble yes

maxmemory 4gb
maxmemory-policy allkeys-lru
maxclients 10000

lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

loglevel notice
logfile ""
slowlog-log-slower-than 10000
slowlog-max-len 1024
latency-monitor-threshold 100

# Enable TLS in regulated environments and set port 0 when TLS-only is required.
# tls-port 6380
# tls-cert-file /etc/redis/tls/server.crt
# tls-key-file /etc/redis/tls/server.key
# tls-ca-cert-file /etc/redis/tls/ca.crt

rename-command FLUSHALL ""
rename-command FLUSHDB ""
