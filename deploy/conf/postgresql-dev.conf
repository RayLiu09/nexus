# Nexus PostgreSQL 15+ development profile.
# Mount or include this file as postgresql.conf in local/dev deployments.
# Authentication rules must be managed in pg_hba.conf; prefer SCRAM even in dev.

listen_addresses = '0.0.0.0'
port = 5432
max_connections = 80

shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 8MB
maintenance_work_mem = 128MB

dynamic_shared_memory_type = posix
timezone = 'UTC'
datestyle = 'iso, mdy'

password_encryption = scram-sha-256
ssl = off

wal_level = replica
fsync = on
full_page_writes = on
synchronous_commit = on
checkpoint_timeout = 10min
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 256MB

log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 500
log_lock_waits = on
deadlock_timeout = 1s
log_timezone = 'UTC'

track_activities = on
track_counts = on
track_io_timing = on
