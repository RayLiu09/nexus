# Nexus RabbitMQ production profile.
# Users, permissions, vhosts, exchanges, queues, DLX and policies should be
# loaded from /etc/rabbitmq/definitions.json, not hard-coded here.
# Template source: deploy/conf/rabbitmq-definitions.json.
# RabbitMQ user: rabbitma_nexus and password: s6+mPIKoQscyOToWsqJ+dmp8XwI/o8XKVJVB9xFi9Qh1MF2A, the hash value for rabbit_nexus_2026

listeners.tcp.default = 5672
# tcp listen options below used to trubleshooting network issues
tcp_listen_options.backlog = 128
tcp_listen_options.nodelay = true
tcp_listen_options.linger.on = true

management.tcp.port = 15672
management.tcp.ip = 127.0.0.1

loopback_users.guest = true
management.load_definitions = /etc/rabbitmq/definitions.json

heartbeat = 60
channel_max = 32 # Increase the maximum number of channels per connection to 128 to support high concurrency. Default is 2047.
consumer_max_per_channel = 64 # Limit the number of consumers per channel to 64 to prevent resource exhaustion. Default is unlimited.
consumer_timeout = 1800000 # When a consumer unacknowledged a message within the timeout period（in milliseconds), the message will be returened to the queue and 
                            # become available for redlivery to another consumer.

vm_memory_calculation_strategy = rss # Use resident set size (RSS) for memory calculations to better reflect actual memory usage. Default is auto.
vm_memory_high_watermark.relative = 0.60 # Limit memory usage to 60% of total RAM to prevent OOM crashes. 
disk_free_limit.absolute = 10GB # Ensure RabbitMQ has at least 10GB of free disk space to operate safely. 
max_message_size = 16777216 # Limit the maximum message size to prevent memory exhaustion. Default is 16777216 bytes (16MB).

# CPU utilization settings, usually used CPU resource limits in container environments
RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS="+S 4:4" # Set the number of scheduler threads to 4 for better CPU utilization. Adjust based on your CPU cores.
RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS="+P 1048576" # Increase the maximum number of processes to 1 million to support high concurrency. Default is 1048576.
RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS="+sbwt none +sbwtdcpu none +sbwtdio none" # Disable the scheduler bound work stealing to reduce latency in high concurrency scenarios. Default is auto.

# MEM allocator settings, adjust based on your workload and memory usage patterns
RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS="+MMscrpmt true" # Pyhsical memory is reserved. Default is true.
RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS="+MMscs 4096" # pre-allocated memory size in MiB when VM start-up.

cluster_partition_handling = pause_minority
queue_leader_locator = balanced
default_queue_type = quorum

collect_statistics = none # Statistics collection can add overhead, so we disable it in production. Adjust as needed for monitoring purposes.
collect_statistics_interval = 5000

proxy_protocol = false # Disable PROXY protocol unless you are using a load balancer(such as HAProxy) in front of rabbitmq that requires it.

log.console = false
log.file = true
log.file.level = info
log.file.formatter = json
log.file.rotation.date = $D0 # Rotate logs daily at midnight. You can also rotate based on size, e.g., log.file.rotation.size = 104857600 for 100MB.
# log.file.rotation.size = 104857600
log.file.rotation.count = 10
log.file.rotation.compress = true # Compress rotated log files to save disk space.

