# Nexus MinIO development profile.
# This is an environment file sourced by supervisor or shell wrappers.

MINIO_VOLUMES="/data/minio"
MINIO_OPTS="--address :9000 --console-address :9001"

MINIO_ROOT_USER="nexus_dev_minio"
MINIO_ROOT_PASSWORD="nexus_dev_minio_password"
MINIO_REGION_NAME="us-east-1"
MINIO_BROWSER="on"
MINIO_API_CORS_ALLOW_ORIGIN="*"

