# Nexus PostgreSQL 15+ production profile.
# Baseline assumes a dedicated 16 GB RAM metadata node. Tune memory per host:
# shared_buffers ~= 25% RAM, effective_cache_size ~= 75% RAM.
# Authentication rules live in pg_hba.conf and must use SCRAM plus restricted CIDRs.

listen_addresses = '0.0.0.0'
port = 5432
max_connections = 200

shared_buffers = 4GB
effective_cache_size = 12GB
work_mem = 16MB
maintenance_work_mem = 1GB
huge_pages = try
dynamic_shared_memory_type = posix

timezone = 'UTC'
datestyle = 'iso, mdy'
password_encryption = scram-sha-256

ssl = on
ssl_min_protocol_version = 'TLSv1.2'
ssl_cert_file = '/etc/postgresql/tls/server.crt'
ssl_key_file = '/etc/postgresql/tls/server.key'

wal_level = replica
fsync = on
full_page_writes = on
synchronous_commit = on
wal_compression = on
max_wal_senders = 10
max_replication_slots = 10
hot_standby = on
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
max_wal_size = 16GB
min_wal_size = 2GB

# Replace with pgBackRest/WAL-G/object-storage archiving in real production.
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'

random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all

log_destination = 'stderr'
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 256MB
log_min_duration_statement = 1000
log_checkpoints = on
log_lock_waits = on
log_temp_files = 64MB
deadlock_timeout = 1s
log_timezone = 'UTC'

track_activities = on
track_counts = on
track_io_timing = on
autovacuum = on
autovacuum_max_workers = 5
autovacuum_naptime = 30s
