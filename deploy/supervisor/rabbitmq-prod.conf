; Supervisor process profile for Nexus RabbitMQ production instance.
; RabbitMQ HA requires quorum queues and clustered nodes. Supervisor only
; restarts the local broker process when it exits or health checks fail.

[program:nexus-rabbitmq]
command=/usr/lib/rabbitmq/bin/rabbitmq-server
user=rabbitmq
directory=/var/lib/rabbitmq
priority=160
autostart=true
autorestart=unexpected
startsecs=30
startretries=5
exitcodes=0
stopsignal=TERM
stopwaitsecs=120
stopasgroup=true
killasgroup=true
umask=0077
stdout_logfile=/var/log/nexus/rabbitmq-supervisor.log
stdout_logfile_maxbytes=100MB
stdout_logfile_backups=10
stderr_logfile=/var/log/nexus/rabbitmq-supervisor.err.log
stderr_logfile_maxbytes=100MB
stderr_logfile_backups=10
environment=RABBITMQ_CONFIG_FILE="/opt/nexus/deploy/conf/rabbitmq-prod.conf",RABBITMQ_USE_LONGNAME="true"

[program:nexus-rabbitmq-watchdog]
command=/opt/nexus/deploy/supervisor/middleware-watchdog.sh nexus-rabbitmq /opt/nexus/deploy/supervisor/healthcheck-rabbitmq.sh
user=rabbitmq
priority=170
autostart=true
autorestart=true
startsecs=5
stopsignal=TERM
stopwaitsecs=20
stdout_logfile=/var/log/nexus/rabbitmq-watchdog.log
stderr_logfile=/var/log/nexus/rabbitmq-watchdog.err.log
environment=CHECK_INTERVAL="30",MAX_FAILURES="3",RESTART_COOLDOWN="180"
